# vault/secrets.yml — template only, do not edit directly
# cp argocd/vault/secrets.yml argocd/vault/secrets-local.yml
# edit secrets-local.yml with your real values, then:
# ansible-vault encrypt argocd/vault/secrets-local.yml
argocd_user_password: "<YOUR_ARGOCD_PASSWORD>"

# SSH private key for ArgoCD to pull from the k3s-apps repo.
# Generate with: ssh-keygen -t ed25519 -C "argocd@k3s-homelab" -f ~/.ssh/argocd_k3s_apps -N ""
# Add the public key (~/.ssh/argocd_k3s_apps.pub) as a deploy key on the k3s-apps repo (read-only).
# Paste the private key below preserving the multiline format exactly (include header/footer lines).
argocd_repo_ssh_key: "<YOUR_ARGOCD_REPO_SSH_PRIVATE_KEY>"