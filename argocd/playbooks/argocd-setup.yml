---
# Before running:
#   cp linux/inventory/hosts.ini linux/inventory/hosts-local.ini
#   # edit hosts-local.ini with your real IPs, username, and timezone
#
#   cp argocd/vault/secrets.yml argocd/vault/secrets-local.yml
#   # edit secrets-local.yml with your real password, then:
#   ansible-vault encrypt argocd/vault/secrets-local.yml
#
#   ansible-galaxy collection install -r requirements.yml
#
# Run with:
#   ansible-playbook -i linux/inventory/hosts-local.ini argocd/playbooks/argocd-setup.yml \
#     --ask-become-pass --ask-vault-pass

- name: Install and configure ArgoCD via Helm
  hosts: homelab
  become: true
  vars_files:
    - "../vault/secrets-local.yml"

  vars:
    argocd_chart_version: "7.8.28"   # https://artifacthub.io/packages/helm/argo/argo-cd
    argocd_namespace: "argocd"
    argocd_user: "<YOUR_USERNAME>"     # your ArgoCD username — change this to whatever you want
    argocd_nodeport: 30080    # access ArgoCD at http://<node-ip>:30080
    argocd_repo_url: "git@github.com:<YOUR_USERNAME>/<YOUR_APPS_REPO>.git"  # SSH URL of the app-of-apps repo

  tasks:

    # ── 1. Install prerequisites ───────────────────────────────────────
    - name: Install kubernetes Python library (required by kubernetes.core modules)
      ansible.builtin.apt:
        name: python3-kubernetes
        state: present
        update_cache: true

    - name: Build ArgoCD cm account key (dynamic key requires set_fact)
      ansible.builtin.set_fact:
        argocd_cm_config: "{{ {'accounts.' + argocd_user: 'login'} }}"
        argocd_cm_config_final: "{{ {'accounts.' + argocd_user: 'login'} | combine({'accounts.admin.enabled': 'false'}) }}"

    - name: Add Argo Helm repo
      kubernetes.core.helm_repository:
        name: argo
        repo_url: https://argoproj.github.io/argo-helm
        kubeconfig: /etc/rancher/k3s/k3s.yaml

    # ── 2. Install ArgoCD via Helm ─────────────────────────────────────
    - name: Create argocd namespace
      kubernetes.core.k8s:
        name: "{{ argocd_namespace }}"
        api_version: v1
        kind: Namespace
        state: present
        kubeconfig: /etc/rancher/k3s/k3s.yaml

    - name: Install ArgoCD chart (admin enabled for initial secret creation)
      kubernetes.core.helm:
        name: argocd
        chart_ref: argo/argo-cd
        chart_version: "{{ argocd_chart_version }}"
        release_namespace: "{{ argocd_namespace }}"
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        atomic: true
        values:
          configs:
            params:
              # Disable TLS on the argocd-server pod — terminate TLS at ingress/LB level
              server.insecure: true
            cm: "{{ argocd_cm_config }}"
            rbac:
              policy.csv: |
                g, {{ argocd_user }}, role:admin
          server:
            service:
              type: NodePort
              nodePortHttp: "{{ argocd_nodeport }}"
      register: argocd_helm_install
      retries: 3
      delay: 15
      until: argocd_helm_install is succeeded

    - name: Wait for ArgoCD server to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ argocd_namespace }}"
        name: argocd-server
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: argocd_deploy
      until: argocd_deploy.resources[0].status.readyReplicas | default(0) >= 1
      retries: 20
      delay: 15

    # ── 3. Install argocd CLI ──────────────────────────────────────────
    - name: Get installed ArgoCD server version
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ argocd_namespace }}"
        name: argocd-server
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: argocd_server_deploy

    - name: Extract ArgoCD app version
      ansible.builtin.set_fact:
        argocd_app_version: >-
          {{ argocd_server_deploy.resources[0].spec.template.spec.containers[0].image
             | regex_search('v[0-9]+\.[0-9]+\.[0-9]+') }}

    - name: Download argocd CLI matching installed version
      ansible.builtin.get_url:
        url: "https://github.com/argoproj/argo-cd/releases/download/{{ argocd_app_version }}/argocd-linux-amd64"
        dest: "/tmp/argocd-{{ argocd_app_version }}"
        mode: '0755'
      retries: 5
      delay: 5

    - name: Install argocd CLI to /usr/local/bin
      ansible.builtin.copy:
        src: /tmp/argocd-{{ argocd_app_version }}
        dest: /usr/local/bin/argocd
        mode: '0755'
        remote_src: true

    # ── 4. Set password for dedicated user ────────────────────────────
    - name: Check if initial admin secret exists
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: "{{ argocd_namespace }}"
        name: argocd-initial-admin-secret
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: argocd_secret
      retries: 12
      delay: 10
      until: argocd_secret.resources | length > 0
      failed_when: false

    - name: Get argocd-server service ClusterIP
      kubernetes.core.k8s_info:
        kind: Service
        namespace: "{{ argocd_namespace }}"
        name: argocd-server
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: argocd_svc
      when: argocd_secret.resources | length > 0

    - name: Set argocd server address
      ansible.builtin.set_fact:
        argocd_server_addr: "{{ argocd_svc.resources[0].spec.clusterIP }}:80"
      when: argocd_secret.resources | length > 0

    - name: Decode initial admin password
      ansible.builtin.set_fact:
        argocd_admin_pass: "{{ argocd_secret.resources[0].data.password | b64decode }}"
      when: argocd_secret.resources | length > 0

    - name: Log in to ArgoCD as admin via ClusterIP
      ansible.builtin.command: >
        argocd login {{ argocd_server_addr }}
        --username admin
        --password "{{ argocd_admin_pass }}"
        --plaintext
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false
      no_log: true
      when: argocd_secret.resources | length > 0

    - name: Set password for dedicated user - {{ argocd_user }}
      ansible.builtin.command: >
        argocd account update-password
        --account "{{ argocd_user }}"
        --new-password "{{ argocd_user_password }}"
        --current-password "{{ argocd_admin_pass }}"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false
      no_log: true
      when: argocd_secret.resources | length > 0

    # ── 5. Disable default admin account ──────────────────────────────
    - name: Upgrade ArgoCD chart to disable default admin account
      kubernetes.core.helm:
        name: argocd
        chart_ref: argo/argo-cd
        chart_version: "{{ argocd_chart_version }}"
        release_namespace: "{{ argocd_namespace }}"
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        atomic: true
        values:
          configs:
            params:
              server.insecure: true
            cm: "{{ argocd_cm_config_final }}"
            rbac:
              policy.csv: |
                g, {{ argocd_user }}, role:admin
          server:
            service:
              type: NodePort
              nodePortHttp: "{{ argocd_nodeport }}"
      when: argocd_secret.resources | length > 0

    # ── 6. Register k3s-apps repo in ArgoCD ───────────────────────────
    - name: Register k3s-apps repo in ArgoCD via SSH deploy key
      kubernetes.core.k8s:
        state: present
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: k3s-apps-repo
            namespace: "{{ argocd_namespace }}"
            labels:
              argocd.argoproj.io/secret-type: repository
          stringData:
            type: git
            url: "{{ argocd_repo_url }}"
            sshPrivateKey: "{{ argocd_repo_ssh_key }}"
