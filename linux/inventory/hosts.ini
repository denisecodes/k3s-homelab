[master]
<YOUR_MASTER_NODE_IP>

[workers]
# Add worker node IPs here, one per line
# <YOUR_WORKER_NODE_1_IP>
# <YOUR_WORKER_NODE_2_IP>

[homelab:children]
master
workers

[homelab:vars]
ansible_user=<YOUR_UBUNTU_USERNAME>
ansible_ssh_private_key_file=~/.ssh/id_ed25519
timezone=<YOUR_TIMEZONE>
# Required for dnsmasq playbook - find with: kubectl get svc -n traefik
traefik_loadbalancer_ip=<TRAEFIK_LOADBALANCER_IP>