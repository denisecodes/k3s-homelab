---
- name: Baseline server setup
  hosts: homelab
  become: true
  tasks:
    - name: Update and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - curl
          - git
          - vim
          - ufw
          - fail2ban
          - unattended-upgrades
        state: present

    - name: Configure UFW default deny
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Allow SSH
      community.general.ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Allow K3s API
      community.general.ufw:
        rule: allow
        port: 6443
        proto: tcp

    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart sshd

    - name: Set timezone
      # Timezone is set via the 'timezone' variable in inventory/hosts.ini
      # Find your timezone string at: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
      community.general.timezone:
        name: "{{ timezone | default('UTC') }}"

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: ssh
        state: restarted