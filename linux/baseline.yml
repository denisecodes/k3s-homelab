---
- name: Baseline server setup
  hosts: homelab
  become: true
  tasks:
    - name: Update and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - curl
          - git
          - vim
          - ufw
          - fail2ban
          - unattended-upgrades
        state: present

    - name: Configure UFW default deny
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Allow SSH
      community.general.ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Allow K3s API
      community.general.ufw:
        rule: allow
        port: 6443
        proto: tcp

    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart sshd

    - name: Set timezone
      # Timezone is set via the 'timezone' variable in inventory/hosts.ini
      # Find your timezone string at: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
      community.general.timezone:
        name: "{{ timezone | default('UTC') }}"

    # Required for K3s on Raspberry Pi — cgroup params must be present before k3s-ansible runs
    - name: Find boot cmdline.txt
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /boot/firmware/cmdline.txt
        - /boot/cmdline.txt
      register: cmdline_stat

    - name: Set cmdline.txt path
      ansible.builtin.set_fact:
        cmdline_path: "{{ (cmdline_stat.results | selectattr('stat.exists') | map(attribute='item') | list | first) | default('') }}"

    - name: Enable cgroup params for K3s
      ansible.builtin.replace:
        path: "{{ cmdline_path }}"
        regexp: '^((?!.*\b{{ cgroup_item }}\b).*)$'
        replace: '\1 {{ cgroup_item }}'
      loop:
        - cgroup_enable=cpuset
        - cgroup_memory=1
        - cgroup_enable=memory
      loop_control:
        loop_var: cgroup_item
      when: cmdline_path != ''
      notify: Reboot for cgroup changes

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Reboot for cgroup changes
      ansible.builtin.reboot:
        reboot_timeout: 120
