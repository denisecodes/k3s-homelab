---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: baseline-test
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    command: /lib/systemd/systemd

provisioner:
  name: ansible
  inventory:
    hosts:
      all:
        hosts:
          baseline-test:
        children:
          homelab:
            hosts:
              baseline-test:
            vars:
              timezone: Europe/London
          master:
            hosts:
              baseline-test:

verifier:
  name: ansible
