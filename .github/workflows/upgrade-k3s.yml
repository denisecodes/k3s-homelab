name: K3s upgrade

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      k3s_version:
        description: 'K3s version to upgrade to (e.g. v1.33.10+k3s1)'
        required: true

jobs:
  handle-reject:
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/reject') &&
      contains(github.event.issue.labels.*.name, 'k3s-upgrade')
    runs-on: ubuntu-latest
    steps:
      - name: Close issue
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'not_planned'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Upgrade rejected. Closing issue.'
            });

  upgrade:
    if: >
      (github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/upgrade') &&
      contains(github.event.issue.labels.*.name, 'k3s-upgrade')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Determine upgrade version
        id: version
        uses: actions/github-script@v9
        with:
          script: |
            let version;
            if (context.eventName === 'workflow_dispatch') {
              version = '${{ github.event.inputs.k3s_version }}';
            } else {
              // Extract version from issue title (format: "... → v1.32.0+k3s1")
              const title = context.payload.issue.title;
              const match = title.match(/→\s*(v[\d.]+\+k3s\d+)/);
              if (match) {
                version = match[1];
              } else {
                core.setFailed('Could not determine upgrade version from issue title');
                return;
              }
            }
            core.setOutput('k3s_version', version);

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Always scan the master node
          ssh-keyscan ${{ secrets.MASTER_NODE_IP }} >> ~/.ssh/known_hosts

          # If WORKER_NODE_IPS is set, scan each worker node too (comma-separated)
          if [ -n "${{ secrets.WORKER_NODE_IPS }}" ]; then
            echo "${{ secrets.WORKER_NODE_IPS }}" | tr ',' '\n' | while read -r ip; do
              ip=$(echo "$ip" | tr -d ' ')
              [ -n "$ip" ] && ssh-keyscan "$ip" >> ~/.ssh/known_hosts
            done
          fi

      - name: Install Ansible
        run: pip install ansible

      - name: Initialise submodules
        run: git submodule update --init --recursive

      - name: Generate runtime k3s-config
        env:
          MASTER_NODE_IP: ${{ secrets.MASTER_NODE_IP }}
          WORKER_NODE_IPS: ${{ secrets.WORKER_NODE_IPS }}
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          K3S_TOKEN: ${{ secrets.K3S_TOKEN }}
          K3S_VERSION: ${{ steps.version.outputs.k3s_version }}
        run: |
          python3 << 'EOF'
          import os, yaml

          master_ip = os.environ['MASTER_NODE_IP']
          agent_ips_raw = os.environ.get('WORKER_NODE_IPS', '').strip()
          ansible_user = os.environ['ANSIBLE_USER']
          k3s_token = os.environ['K3S_TOKEN']
          k3s_version = os.environ['K3S_VERSION']

          agent_hosts = {}
          if agent_ips_raw:
              for ip in agent_ips_raw.split(','):
                  ip = ip.strip()
                  if ip:
                      agent_hosts[ip] = None

          config = {
              'k3s_cluster': {
                  'children': {
                      'server': {'hosts': {master_ip: None}},
                      'agent': {'hosts': agent_hosts or {}}
                  },
                  'vars': {
                      'ansible_user': ansible_user,
                      'ansible_ssh_private_key_file': '~/.ssh/id_ed25519',
                      'k3s_version': k3s_version,
                      'token': k3s_token,
                      'api_endpoint': "{{ hostvars[groups['server'][0]]['ansible_host'] | default(groups['server'][0]) }}",
                      'extra_server_args': '--disable traefik'
                  }
              }
          }

          with open('runtime-k3s-config.yml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False, allow_unicode=True)
          print("Generated runtime-k3s-config.yml")
          EOF

      - name: Update k3s_version in template config
        run: |
          sed -i "s/k3s_version:.*/k3s_version: ${{ steps.version.outputs.k3s_version }}/" \
            k3s/k3s-config.yml

      - name: Run upgrade playbook
        run: |
          ansible-playbook k3s-ansible/playbooks/upgrade.yml \
            -i runtime-k3s-config.yml

      - name: Commit updated version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k3s/k3s-config.yml
          git commit -m "chore: upgrade K3s to ${{ steps.version.outputs.k3s_version }}"
          git push

      - name: Comment and close issue
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v9
        with:
          script: |
            const version = '${{ steps.version.outputs.k3s_version }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Upgrade to ${version} completed successfully.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });